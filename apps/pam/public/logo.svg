<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="100%" height="100%">
  <defs>
    <linearGradient id="coreGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="var(--primary-start, #4f46e5)" />
      <stop offset="100%" stop-color="var(--primary-end, #8b5cf6)" />
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <g filter="url(#glow)">
    <rect x="130" y="130" width="140" height="140" rx="30" fill="url(#coreGrad)" transform="rotate(45 200 200)" />
  </g>
  <circle cx="200" cy="200" r="18" fill="var(--center-color, #ffffff)" opacity="0.95" />
  <circle cx="145" cy="140" r="7" fill="var(--dot1, #06b6d4)" opacity="0.9" />
  <circle cx="255" cy="140" r="7" fill="var(--dot2, #d946ef)" opacity="0.9" />
  <circle cx="200" cy="280" r="7" fill="var(--dot3, #f59e0b)" opacity="0.9" />
</svg>